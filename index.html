<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NA Coptic League – Playoffs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
body{font-family:Arial,sans-serif;background:#fdfcfa;overflow-x:hidden;}

/* ============ HEADER ============ */
.header{background:linear-gradient(160deg,#4a0d0d 0%,#5c1010 35%,#7d1a1a 70%,#8f2222 100%);padding:28px 20px 24px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 85% -20%,rgba(212,160,23,.22),transparent 55%),
  radial-gradient(circle at 10% 120%,rgba(212,160,23,.12),transparent 50%),
  repeating-linear-gradient(115deg,transparent 0 22px,rgba(255,255,255,.025) 22px 24px);}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#d4a017 25%,#f5d78e 50%,#d4a017 75%,transparent);background-size:200% 100%;animation:shine 5s linear infinite;}
@keyframes shine{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.header .trophy{font-size:1.9rem;margin-bottom:6px;position:relative;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));animation:bob 3.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.header h1{font-size:1.5rem;color:#f5d78e;font-weight:800;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.35);position:relative;}
.header .sub{font-size:.64rem;color:#dcaaaa;margin-top:6px;letter-spacing:.2em;font-weight:700;text-transform:uppercase;position:relative;}

/* ============ FILTERS ============ */
.filters{background:#d8c8ba;border-bottom:2px solid #b8a492;padding:14px 16px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(92,16,16,.08);}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;max-width:1000px;margin:0 auto;}
.fg{flex:1;min-width:160px;}
.fg label{display:block;font-size:.66rem;font-weight:800;color:#5c1010;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;}
.fg select{width:100%;padding:11px 12px;border:2px solid #b8a492;border-radius:10px;font-size:.92rem;font-weight:700;color:#5c1010;background:#fff;cursor:pointer;transition:border-color .2s, box-shadow .2s;}
.fg select:focus{outline:none;border-color:#d4a017;box-shadow:0 0 0 3px rgba(212,160,23,.25);}

/* ============ MAIN ============ */
.main{max-width:1000px;margin:0 auto;padding:20px 8px 46px;}
.div-title{text-align:center;margin-bottom:6px;}
.div-title h2{display:inline-flex;align-items:center;gap:8px;font-size:1rem;font-weight:800;color:#5c1010;text-transform:uppercase;letter-spacing:.08em;padding:8px 22px;border:1.5px solid #e8d9a0;border-radius:26px;background:linear-gradient(135deg,#fdf8e4,#fffdf5);box-shadow:0 3px 12px rgba(180,130,0,.14);}
.hs-note{max-width:420px;margin:10px auto 0;text-align:center;font-size:.68rem;font-weight:700;color:#96700a;background:linear-gradient(135deg,#fdf6dd,#fffdf4);border:1px dashed #e5c766;border-radius:10px;padding:8px 14px;line-height:1.5;}
.legend{display:flex;gap:14px;justify-content:center;margin:12px 0 18px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-weight:700;color:#8a7a6a;text-transform:uppercase;letter-spacing:.05em;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.g{background:#1a7d1a;}
.dot.gold{background:#d4a017;}
.dot.t{background:#cbbba8;}

.empty{text-align:center;padding:52px 20px;}
.empty .icon{font-size:2.8rem;margin-bottom:14px;}
.empty h3{color:#5c1010;font-size:1.05rem;margin-bottom:8px;font-weight:800;}
.empty p{font-size:.85rem;color:#777;line-height:1.7;}

/* ============ BRACKET — MOBILE: vertical TREE (rounds are rows, games side-by-side, connectors merge downward) ============ */
.bracket-wrap{display:flex;flex-direction:column;align-items:stretch;width:100%;}
.bracket-round{display:flex;flex-direction:column;align-items:center;width:100%;}
.round-label{font-size:.68rem;font-weight:800;color:#b8860b;text-transform:uppercase;letter-spacing:.14em;text-align:center;padding:2px 0 8px;width:100%;}
.round-label::after{content:'';display:block;width:34px;height:2px;background:linear-gradient(90deg,transparent,#d4a017,transparent);margin:5px auto 0;}
.bracket-slots{display:flex;flex-direction:row;justify-content:center;align-items:stretch;gap:6px;width:100%;}
.slot{flex:1;min-width:0;max-width:230px;animation:fadeUp .4s ease both;display:flex;}
.slot>div{width:100%;}
.bracket-slots .slot:nth-child(2){animation-delay:.06s;}
.bracket-slots .slot:nth-child(3){animation-delay:.12s;}
.bracket-slots .slot:nth-child(4){animation-delay:.18s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* vertical merge connectors between rows (mobile bracket lines) */
.v-conn{display:block;width:100%;height:30px;}
.v-conn svg{display:block;width:100%;height:100%;}
.d-conn{display:none;}

/* compact sizing when 4 games share a row */
.c4 .round-tag{font-size:.46rem;padding:3px 5px;letter-spacing:.04em;}
.c4 .round-tag::before{display:none;}
.c4 .meta-line{font-size:.5rem;padding:4px 5px;gap:2px 5px;}
.c4 .team-line{padding:6px 5px;gap:3px;}
.c4 .tname{font-size:.6rem;}
.c4 .tscore{font-size:.6rem;min-width:14px;}
.c4 .wbadge{font-size:.44rem;padding:1px 3px;}
/* slightly compact when 2 games share a row */
.c2 .tname{font-size:.72rem;}
.c2 .meta-line{font-size:.58rem;}

/* ============ GAME CARD ============ */
.game-card{border:1.5px solid #e5c766;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 3px 12px rgba(180,130,0,.14);transition:transform .15s, box-shadow .15s;position:relative;}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d4a017,#f5d78e,#d4a017);}
.game-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(180,130,0,.24);}
.round-tag{background:linear-gradient(135deg,#fdf3cf,#fbeeba);padding:4px 9px;font-size:.56rem;font-weight:800;color:#96700a;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;}
.round-tag::before{content:'🏆';font-size:.6rem;}
.meta-line{padding:5px 9px;font-size:.6rem;font-weight:700;color:#8a7a6a;background:#fbf8f2;border-bottom:1px solid #f0e8da;display:flex;flex-wrap:wrap;gap:2px 8px;line-height:1.45;}
.meta-line a{color:#8a6c1c;text-decoration:underline;}
.meta-line a:hover{color:#7d1a1a;}
.team-line{display:flex;align-items:center;padding:8px 9px;gap:5px;border-bottom:1px solid #f7f2e8;}
.team-line:last-child{border-bottom:none;}
.team-line.win{background:linear-gradient(90deg,#eefbee,#f7fdf7);}
.team-line.lose{opacity:.5;}
.tname{flex:1;font-size:.76rem;font-weight:700;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.tname.tbd{color:#c2b49f;font-style:italic;font-weight:600;}
.tname.pend{color:#a98416;font-style:italic;font-weight:600;}
.tname.adv{color:#8a6c1c;}
.tscore{font-size:.74rem;font-weight:800;min-width:18px;text-align:right;color:#5c1010;flex-shrink:0;}
.tscore.wscore{color:#1a7d1a;}
.wbadge{font-size:.52rem;font-weight:800;background:#1a7d1a;color:#fff;padding:2px 4px;border-radius:4px;margin-left:1px;flex-shrink:0;}
.tbd-card{border:1.5px dashed #d8cbb6;border-radius:10px;overflow:hidden;background:#fffdf8;}
.tbd-card .round-tag{background:#f7f1e3;color:#b3a48d;}
.tbd-card .round-tag::before{content:'⏳';}
.tbd-card .meta-line{background:#fbf8f1;}

/* ============ CHAMPION ============ */
.champ-box{width:100%;max-width:280px;margin:0 auto;border:2px solid #d4a017;border-radius:16px;padding:22px 14px;text-align:center;background:linear-gradient(150deg,#fdf6dd,#fffdf4 60%,#fdf3cf);box-shadow:0 6px 26px rgba(180,130,0,.3), inset 0 1px 0 rgba(255,255,255,.8);position:relative;overflow:hidden;}
.champ-box::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:140px;height:70px;background:radial-gradient(ellipse,rgba(245,215,142,.65),transparent 70%);}
.champ-box::after{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);animation:sweep 4s ease-in-out infinite;}
@keyframes sweep{0%,55%{left:-80%;}85%,100%{left:130%;}}
.champ-box .ci{font-size:2.2rem;margin-bottom:8px;filter:drop-shadow(0 3px 8px rgba(180,130,0,.4));}
.champ-box .cl{font-size:.58rem;font-weight:800;color:#96700a;text-transform:uppercase;letter-spacing:.2em;margin-bottom:8px;}
.champ-box .cn{font-size:1rem;font-weight:800;color:#5c1010;}
.champ-box .ctbd{font-size:.82rem;color:#c2b49f;font-style:italic;}

@media(prefers-reduced-motion:reduce){
  .header::after,.header .trophy,.champ-box::after,.slot{animation:none;}
}

/* ============ DESKTOP ≥760px: classic horizontal bracket ============ */
@media(min-width:760px){
  .bracket-wrap{flex-direction:row;align-items:stretch;padding-top:4px;}
  .bracket-round{min-width:0;flex:1;}
  .bracket-slots{flex-direction:column;flex:1;gap:14px;justify-content:space-around;}
  .slot{width:178px;max-width:178px;flex:none;margin:0 auto;}
  .champ-box{width:178px;}
  .round-label{font-size:.62rem;}
  .v-conn{display:none;}
  .d-conn{display:block;flex-shrink:0;align-self:center;}
  .tname{font-size:.74rem;}
  .c4 .round-tag{font-size:.56rem;padding:4px 9px;letter-spacing:.08em;}
  .c4 .round-tag::before{display:inline;}
  .c4 .meta-line{font-size:.6rem;padding:5px 9px;gap:2px 8px;}
  .c4 .team-line{padding:8px 9px;gap:5px;}
  .c4 .tname,.c2 .tname{font-size:.74rem;}
  .c4 .tscore{font-size:.74rem;min-width:18px;}
  .c4 .wbadge{font-size:.52rem;padding:2px 4px;}
  .c2 .meta-line{font-size:.6rem;}
}
</style>
</head>
<body>

<div class="header">
  <div class="trophy">🏆</div>
  <h1>2026 Playoffs</h1>
  <div class="sub">NA Coptic League · Road to the Championship</div>
</div>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>Division</label>
      <select id="fdiv" onchange="renderBracket()">
        <option value="">— Select Division —</option>
        <option value="JHS">Junior High (JHS)</option>
        <option value="Girls">Girls</option>
        <option value="HS-NY">High School — NY</option>
        <option value="HS-NJ">High School — NJ</option>
        <option value="College">College</option>
        <option value="Mens">Mens</option>
      </select>
    </div>
  </div>
</div>

<div class="main">
<div id="dbg" style="text-align:center;font-size:.66rem;color:#c5b8a5;margin-bottom:10px;"></div>
<div id="out">
  <div class="empty"><div class="icon">🏆</div><h3>Select a Division</h3><p>Choose a division to view the playoff bracket.</p></div>
</div>
</div>

<script>
var GAMES = [];
var R1_DATE  = '2026-07-11';
var R2_DATE  = '2026-07-12';
var SF_DATES = ['2026-07-18','2026-07-19'];
var F_DATES  = ['2026-07-26'];
var ALL_PO   = [R1_DATE,R2_DATE].concat(SF_DATES,F_DATES);
var DIV_LABELS = {JHS:'Junior High',Girls:'Girls',"HS-NY":"High School NY","HS-NJ":"High School NJ",College:'College',Mens:'Mens'};
var VENUES = {
  HC:{name:"Holy Child",url:"https://maps.google.com/?q=4747+Amboy+Rd,+Staten+Island,+NY+10312"},
  BK:{name:"St. George Comm. Ctr",url:"https://maps.google.com/?q=6209+11th+Ave,+Brooklyn,+NY+11219"},
  EB:{name:"St. Mark Academy",url:"https://maps.google.com/?q=80+David+St,+South+River,+NJ+08882"},
  LI:{name:"St. Mark Center LI",url:"https://maps.google.com/?q=90+Woodbury+Rd,+Woodbury,+NY+11797"},
  CYO:{name:"CYO MIV",url:"https://maps.google.com/?q=CYO+MIV"},
  SJN:{name:"St. John Neuman",url:"https://maps.google.com/?q=St+John+Neumann+Staten+Island"},
  GC:{name:"Kimisis GC",url:"https://maps.google.com/?q=20+Hillcrest+Rd,+Holmdel,+NJ+07733"}
};

function normDate(d){
  if(!d) return '';
  d = String(d).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  var m = d.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(m){
    var mo=('0'+m[1]).slice(-2), day=('0'+m[2]).slice(-2);
    return m[3]+'-'+mo+'-'+day;
  }
  return d;
}
function normDiv(d){
  return String(d||'').replace(/[\u2010-\u2015\u2212]/g,'-').replace(/\s+/g,'').toUpperCase();
}
function fmtShortDate(d){
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function loadGames(){
  fetch('https://nacopticleague.github.io/full-schedule-homepage/data/games.json?_='+Date.now())
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      GAMES=(Array.isArray(d)?d:[]).map(function(g){
        g.date = normDate(g.date);
        return g;
      });
      document.getElementById('dbg').textContent = GAMES.length+' games loaded';
      var dv=document.getElementById('fdiv').value;
      if(dv)renderBracket();
    })
    .catch(function(err){
      document.getElementById('out').innerHTML='<div class="empty"><div class="icon">⚠️</div><h3>Could not load games.json</h3><p>'+err.message+'</p></div>';
    });
}

function sortDT(a,b){
  if(a.date!==b.date)return a.date<b.date?-1:1;
  function to24(t){var p=String(t||'').split(' '),hm=(p[0]||'0:00').split(':'),h=+hm[0],m=+hm[1]||0;if(p[1]==='PM'&&h!==12)h+=12;if(p[1]==='AM'&&h===12)h=0;return h*60+m;}
  return to24(a.time)-to24(b.time);
}
function isPlaceholder(name){return !name || String(name).indexOf('/')>=0;}

/*
  Build a display slot from a scheduled game plus the winners feeding into it.
  Priority for each team line:
    1. Real name in games.json (e.g. after you update the sheet)
    2. Winner auto-advanced from the feeding game (decided by winner flag OR scores)
    3. Predicted pairing text from games.json (placeholder like "Team A / Team B")
    4. TBD
  Date / time / venue always autopopulate from the scheduled game.
*/
function buildSlot(sched, feedW1, feedW2){
  var t1=null,t2=null,fed1=false,fed2=false,pend1=false,pend2=false;
  if(sched && !isPlaceholder(sched.t1)) t1=sched.t1;
  else if(feedW1){ t1=feedW1; fed1=true; }
  else if(sched && sched.t1){ t1=sched.t1; pend1=true; }   // predicted pairing shown
  if(sched && !isPlaceholder(sched.t2)) t2=sched.t2;
  else if(feedW2){ t2=feedW2; fed2=true; }
  else if(sched && sched.t2){ t2=sched.t2; pend2=true; }

  var s1 = sched ? (sched.s1!==undefined&&sched.s1!==null?String(sched.s1):'') : '';
  var s2 = sched ? (sched.s2!==undefined&&sched.s2!==null?String(sched.s2):'') : '';
  var real = sched && !isPlaceholder(sched.t1) && !isPlaceholder(sched.t2);
  var win = '';
  if(real){
    if(sched.winner==='t1'||sched.winner==='t2'){
      win = sched.winner;
    } else if(s1!=='' && s2!=='' && !isNaN(+s1) && !isNaN(+s2) && +s1!==+s2){
      win = (+s1 > +s2) ? 't1' : 't2';   // derive winner from scores
    }
  }
  return {
    t1:t1, t2:t2, fed1:fed1, fed2:fed2, pend1:pend1, pend2:pend2,
    date:sched?sched.date:null, time:sched?sched.time:null, v:sched?sched.v:null,
    winner:win,
    s1:real?s1:'', s2:real?s2:''
  };
}
function slotWinner(slot){
  if(!slot||!slot.winner)return null;
  return slot.winner==='t1'?slot.t1:slot.t2;
}

/*
  Build the in-division rounds with winners flowing forward.
  Returns { rounds:[{label,slots}], champion, lastWinners }
*/
function buildDivRounds(div){
  var isHS = (div==='HS-NY'||div==='HS-NJ');
  var dg = GAMES.filter(function(g){return normDiv(g.div)===normDiv(div);});
  var r1 = dg.filter(function(g){return g.date===R1_DATE;}).sort(sortDT);
  var r2 = dg.filter(function(g){return g.date===R2_DATE;}).sort(sortDT);
  var sf = dg.filter(function(g){return SF_DATES.indexOf(g.date)>=0;}).sort(sortDT);
  var twoStage = r2.length > 0;

  var rounds = [];
  var r1slots = [];
  for(var i=0;i<Math.max(4,r1.length);i++) r1slots.push(r1[i]?buildSlot(r1[i],null,null):null);
  rounds.push({label: twoStage?'First Round':'Quarterfinals', slots:r1slots});
  var w1 = r1slots.map(slotWinner);

  if(twoStage){
    var r2slots = [
      buildSlot(r2[0]||null, w1[0]||null, w1[1]||null),
      buildSlot(r2[1]||null, w1[2]||null, w1[3]||null)
    ];
    rounds.push({label:'Round 2', slots:r2slots});
    var w2 = r2slots.map(slotWinner);
    var dfSlot = buildSlot(sf[0]||null, w2[0]||null, w2[1]||null);
    rounds.push({label: isHS?'Division Final':'Semifinals', slots:[dfSlot]});
    var dfW = slotWinner(dfSlot);
    return {rounds:rounds, champion:dfW, lastWinners:[dfW,null]};
  } else {
    var sfSlots = [
      buildSlot(sf[0]||null, w1[0]||null, w1[1]||null),
      buildSlot(sf[1]||null, w1[2]||null, w1[3]||null)
    ];
    rounds.push({label: isHS?'Division Finals':'Semifinals', slots:sfSlots});
    var sw = sfSlots.map(slotWinner);
    return {rounds:rounds, champion:null, lastWinners:[sw[0]||null, sw[1]||null]};
  }
}

/* Division champion helper (used for the cross-division HS Championship). */
function divChampion(div){
  var b = buildDivRounds(div);
  return b.champion || null;
}

function renderBracket(){
  var div = document.getElementById('fdiv').value;
  var out = document.getElementById('out');
  if(!div){out.innerHTML='<div class="empty"><div class="icon">🏆</div><h3>Select a Division</h3><p>Choose a division to view the playoff bracket.</p></div>';return;}

  var isHS = (div==='HS-NY'||div==='HS-NJ');
  var dg = GAMES.filter(function(g){return normDiv(g.div)===normDiv(div);});

  // Finals game: for HS divisions the July 26 game is the cross-division
  // HS Championship — it may be tagged HS, HS-NY, or HS-NJ in the sheet.
  var f;
  if(isHS){
    f = GAMES.filter(function(g){return F_DATES.indexOf(g.date)>=0 && normDiv(g.div).indexOf('HS')===0;}).sort(sortDT);
  } else {
    f = dg.filter(function(g){return F_DATES.indexOf(g.date)>=0;}).sort(sortDT);
  }

  var anyPO = dg.some(function(g){return ALL_PO.indexOf(g.date)>=0;}) || f.length>0;
  if(!anyPO){
    out.innerHTML='<div class="empty"><div class="icon">📅</div><h3>No Playoff Games Yet</h3><p>The '+div+' bracket will appear once games are scheduled.<br><br><span style="font-size:.72rem;color:#bbb;">Debug: '+GAMES.length+' total · '+dg.length+' in division</span></p></div>';
    return;
  }

  var b = buildDivRounds(div);
  var rounds = b.rounds;

  // Finals / HS Championship slot with winners auto-fed from scores.
  var fSlot, fTbdLabels=null, fLabel;
  if(isHS){
    fLabel = 'HS Championship';
    fSlot = buildSlot(f[0]||null, divChampion('HS-NY'), divChampion('HS-NJ'));
    fTbdLabels = ['HS-NY Champion','HS-NJ Champion'];
  } else {
    fLabel = 'Finals';
    fSlot = buildSlot(f[0]||null, b.lastWinners[0], b.lastWinners[1]);
  }
  rounds.push({label:fLabel, slots:[fSlot], tbdLabels:fTbdLabels});

  var champ = slotWinner(fSlot);

  var html = '<div class="div-title"><h2>🏆 '+ (DIV_LABELS[div]||div) +' Division</h2></div>';
  if(isHS){
    var other = div==='HS-NY' ? 'HS-NJ' : 'HS-NY';
    html += '<div class="hs-note">⚔️ The '+div+' champion faces the '+other+' champion in the HS Championship — July 26</div>';
  }
  html += '<div class="legend"><span><span class="dot g"></span>Winner</span><span><span class="dot gold"></span>Advanced / Projected</span><span><span class="dot t"></span>TBD</span></div>';
  html += '<div class="bracket-wrap">';

  for(var i=0;i<rounds.length;i++){
    if(i>0){
      html += vConn(rounds[i-1].slots.length, rounds[i].slots.length);
      html += dConn(rounds[i-1].slots.length, rounds[i].slots.length);
    }
    html += roundCol(rounds[i]);
  }
  html += vConn(1,1);
  html += dConn(1,1);
  html += champCol(champ, isHS ? 'HS Champion' : 'Champion');

  html += '</div>';
  out.innerHTML = html;
}

function roundCol(round){
  var n = round.slots.length;
  var sizeClass = n>=4 ? ' c4' : (n===2 ? ' c2' : '');
  var h = '<div class="bracket-round'+sizeClass+'">';
  h += '<div class="round-label">'+round.label+'</div>';
  h += '<div class="bracket-slots">';
  for(var i=0;i<n;i++){
    h += '<div class="slot">'+gameCard(round.slots[i], round.label, round.tbdLabels)+'</div>';
  }
  h += '</div></div>';
  return h;
}

function metaHTML(slot){
  if(!slot||(!slot.date&&!slot.v&&!slot.time)) return '';
  var parts=[];
  if(slot.date) parts.push('📅 '+fmtShortDate(slot.date));
  if(slot.time) parts.push('🕐 '+slot.time);
  var vn = slot.v?VENUES[slot.v]:null;
  if(vn) parts.push('<a href="'+vn.url+'" target="_blank">📍 '+vn.name+'</a>');
  else if(slot.v) parts.push('📍 '+slot.v);
  if(!parts.length) return '';
  return '<div class="meta-line"><span>'+parts.join('</span><span>')+'</span></div>';
}

function gameCard(slot, roundLabel, tbdLabels){
  var tbd1 = (tbdLabels&&tbdLabels[0])||'TBD';
  var tbd2 = (tbdLabels&&tbdLabels[1])||'TBD';
  if(!slot){
    return '<div class="tbd-card"><div class="round-tag">'+roundLabel+'</div>'+
      '<div class="team-line"><span class="tname tbd">'+tbd1+'</span></div>'+
      '<div class="team-line"><span class="tname tbd">'+tbd2+'</span></div></div>';
  }
  var w = slotWinner(slot);
  var t1win = w && w===slot.t1, t2win = w && w===slot.t2;
  var t1 = slot.t1||tbd1, t2 = slot.t2||tbd2;
  var settled = slot.t1 && slot.t2 && !slot.pend1 && !slot.pend2;
  var cardClass = settled ? 'game-card' : 'tbd-card';
  function nameClass(has,pend,fed){
    if(!has) return ' tbd';
    if(pend) return ' pend';
    if(fed) return ' adv';
    return '';
  }
  return '<div class="'+cardClass+'">'+
    '<div class="round-tag">'+roundLabel+'</div>'+
    metaHTML(slot)+
    '<div class="team-line'+(t1win?' win':w?' lose':'')+'">'+
      '<span class="tname'+nameClass(slot.t1,slot.pend1,slot.fed1)+'">'+t1+'</span>'+
      (slot.s1?'<span class="tscore'+(t1win?' wscore':'')+'">'+slot.s1+'</span>':'')+
      (t1win?'<span class="wbadge">W</span>':'')+
    '</div>'+
    '<div class="team-line'+(t2win?' win':w?' lose':'')+'">'+
      '<span class="tname'+nameClass(slot.t2,slot.pend2,slot.fed2)+'">'+t2+'</span>'+
      (slot.s2?'<span class="tscore'+(t2win?' wscore':'')+'">'+slot.s2+'</span>':'')+
      (t2win?'<span class="wbadge">W</span>':'')+
    '</div>'+
  '</div>';
}

/* Mobile connector: SVG bracket lines merging pairs downward into the next row */
function vConn(fromCount, toCount){
  var H = 30;
  var svg = '<div class="v-conn"><svg viewBox="0 0 100 '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">';
  var ratio = fromCount/toCount;
  function ln(x1,y1,x2,y2){
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#d4a017" stroke-width="2" vector-effect="non-scaling-stroke"/>';
  }
  for(var t=0;t<toCount;t++){
    var toX = (t+0.5)*100/toCount;
    svg += ln(toX, H/2, toX, H);                       // drop into next round
    if(fromCount>toCount){
      var f0=t*ratio, f1=f0+ratio-1;
      var x0=(f0+0.5)*100/fromCount, x1=(f1+0.5)*100/fromCount;
      svg += ln(x0, 0, x0, H/2);                       // down from left feeder
      svg += ln(x1, 0, x1, H/2);                       // down from right feeder
      svg += ln(x0, H/2, x1, H/2);                     // merge bar
    } else {
      svg += ln(toX, 0, toX, H/2);                     // straight through
    }
  }
  svg += '</svg></div>';
  return svg;
}

/* Desktop connector: SVG lines between columns (hidden on mobile) */
function dConn(fromCount, toCount){
  var totalH = 4*128 + 3*14;
  var w=30;
  var svg='<svg class="d-conn" width="'+w+'" height="'+totalH+'" xmlns="http://www.w3.org/2000/svg">';
  var fromSpacing = totalH/fromCount;
  var toSpacing = totalH/toCount;
  var ratio = fromCount/toCount;
  for(var t=0;t<toCount;t++){
    var toY = toSpacing*(t+0.5);
    svg += '<line x1="'+(w/2)+'" y1="'+toY+'" x2="'+w+'" y2="'+toY+'" stroke="#d4a017" stroke-width="2"/>';
    if(fromCount>toCount){
      var f0=t*ratio, f1=f0+ratio-1;
      var y0=fromSpacing*(f0+0.5), y1=fromSpacing*(f1+0.5);
      svg += '<line x1="0" y1="'+y0+'" x2="'+(w/2)+'" y2="'+y0+'" stroke="#d4a017" stroke-width="2"/>';
      svg += '<line x1="0" y1="'+y1+'" x2="'+(w/2)+'" y2="'+y1+'" stroke="#d4a017" stroke-width="2"/>';
      svg += '<line x1="'+(w/2)+'" y1="'+y0+'" x2="'+(w/2)+'" y2="'+y1+'" stroke="#d4a017" stroke-width="2"/>';
    } else {
      svg += '<line x1="0" y1="'+toY+'" x2="'+(w/2)+'" y2="'+toY+'" stroke="#d4a017" stroke-width="2"/>';
    }
  }
  svg+='</svg>';
  return svg;
}

function champCol(champ, label){
  return '<div class="bracket-round">'+
    '<div class="round-label">'+label+'</div>'+
    '<div class="bracket-slots" style="justify-content:center;">'+
    '<div class="slot" style="flex:none;width:100%;max-width:280px;margin:0 auto;"><div class="champ-box">'+
      '<div class="ci">🏆</div>'+
      '<div class="cl">'+label+'</div>'+
      (champ ? '<div class="cn">'+champ+'</div>' : '<div class="ctbd">To Be Crowned</div>')+
    '</div></div></div></div>';
}

loadGames();
