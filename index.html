<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NA Coptic League – Playoffs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#fff;min-height:100vh;}
.header{background:#7d1a1a;padding:22px 20px 18px;text-align:center;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#c9b5a5,#d4a017,#c9b5a5);}
.header h1{font-size:1.4rem;color:#f5d78e;font-weight:800;letter-spacing:.02em;}
.header .sub{font-size:.7rem;color:#c98a8a;margin-top:4px;letter-spacing:.1em;font-weight:600;}
.filters{background:#d8c8ba;border-bottom:2px solid #b8a492;padding:14px 16px;}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;max-width:960px;margin:0 auto;}
.fg{flex:1;min-width:160px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:#5c1010;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.fg select{width:100%;padding:9px 12px;border:2px solid #b8a492;border-radius:6px;font-size:.88rem;font-weight:600;color:#5c1010;background:#fff;cursor:pointer;}
.fg select:focus{outline:none;border-color:#7d1a1a;}
.main{max-width:960px;margin:0 auto;padding:20px 14px 40px;overflow-x:auto;}
.div-title{text-align:center;margin-bottom:20px;}
.div-title h2{font-size:1.1rem;font-weight:800;color:#5c1010;text-transform:uppercase;letter-spacing:.06em;}
.empty{text-align:center;padding:48px 20px;}
.empty .icon{font-size:2.6rem;margin-bottom:12px;}
.empty h3{color:#5c1010;font-size:1rem;margin-bottom:6px;font-weight:700;}
.empty p{font-size:.85rem;color:#666;line-height:1.6;}

/* Bracket layout */
.bracket-wrap{display:flex;align-items:stretch;min-width:fit-content;}
.bracket-round{display:flex;flex-direction:column;align-items:center;min-width:170px;}
.round-label{font-size:.62rem;font-weight:800;color:#b8860b;text-transform:uppercase;letter-spacing:.1em;text-align:center;padding:0 0 10px;width:100%;}
.bracket-slots{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:0;width:100%;}

/* Game slot */
.slot{width:160px;margin:0 auto;}
.game-card{border:2px solid #d4a017;border-radius:8px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(180,130,0,.12);}
.game-card .round-tag{background:#fdf5d8;padding:3px 8px;font-size:.58rem;font-weight:800;color:#b8860b;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #f0e0a0;}
.team-line{display:flex;align-items:center;padding:7px 8px;gap:5px;border-bottom:1px solid #f5f0e8;}
.team-line:last-child{border-bottom:none;}
.team-line.win{background:#f0fbf0;}
.team-line.lose{opacity:.55;}
.tname{flex:1;font-size:.74rem;font-weight:700;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tname.tbd{color:#b8a492;font-style:italic;font-weight:400;}
.tscore{font-size:.72rem;font-weight:800;min-width:20px;text-align:right;color:#5c1010;}
.tscore.wscore{color:#1a7d1a;}
.wbadge{font-size:.55rem;font-weight:800;background:#1a7d1a;color:#fff;padding:1px 4px;border-radius:3px;margin-left:2px;flex-shrink:0;}
.tbd-card{border:2px dashed #d8c8ba;border-radius:8px;overflow:hidden;background:#fafaf8;}
.tbd-card .round-tag{background:#f5f0e8;padding:3px 8px;font-size:.58rem;font-weight:800;color:#b8a492;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #ede5da;}

/* Champion */
.champ-box{width:160px;margin:0 auto;border:2px solid #d4a017;border-radius:10px;padding:16px 10px;text-align:center;background:linear-gradient(135deg,#fdf8e4,#fff9ec);box-shadow:0 4px 16px rgba(180,130,0,.2);}
.champ-box .ci{font-size:1.8rem;margin-bottom:6px;}
.champ-box .cl{font-size:.6rem;font-weight:800;color:#b8860b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.champ-box .cn{font-size:.95rem;font-weight:800;color:#5c1010;}
.champ-box .ctbd{font-size:.82rem;color:#b8a492;font-style:italic;}

/* Connector column */
.connector-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;align-items:center;min-width:32px;}

/* Spacer */
.spacer{flex:1;}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:1.4rem;margin-bottom:4px;">🏆</div>
  <h1>2026 Playoffs</h1>
  <div class="sub">NA Coptic League · Championship Bracket</div>
</div>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>Division</label>
      <select id="fdiv" onchange="renderBracket()">
        <option value="">— Select Division —</option>
        <option value="JHS">Junior High (JHS)</option>
        <option value="Girls">Girls</option>
        <option value="HS-NY">High School — NY</option>
        <option value="HS-NJ">High School — NJ</option>
        <option value="College">College</option>
        <option value="Mens">Mens</option>
      </select>
    </div>
  </div>
</div>

<div class="main"><div id="out">
  <div class="empty"><div class="icon">🏆</div><h3>Select a Division</h3><p>Choose a division to view the playoff bracket.</p></div>
</div></div>

<script>
var GAMES = [];
var QF_DATES  = ['2026-07-11','2026-07-12'];
var SF_DATES  = ['2026-07-18','2026-07-19'];
var F_DATES   = ['2026-07-26'];
var DIV_LABELS = {JHS:'Junior High',Girls:'Girls',"HS-NY":"High School NY","HS-NJ":"High School NJ",College:'College',Mens:'Mens'};

function loadGames(){
  fetch('https://nacopticleague.github.io/coybl/data/games.json?_='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){GAMES=Array.isArray(d)?d:[];var dv=document.getElementById('fdiv').value;if(dv)renderBracket();})
    .catch(function(){});
}

function sortDT(a,b){if(a.date!==b.date)return a.date<b.date?-1:1;return a.time<b.time?-1:1;}
function winner(g){if(!g||!g.winner)return null;return g.winner==='t1'?g.t1:g.t2;}
function loser(g){if(!g||!g.winner)return null;return g.winner==='t1'?g.t2:g.t1;}

/* Build a projected game object from two projected teams */
function proj(t1,t2){return {t1:t1||null,t2:t2||null,winner:null,s1:null,s2:null,projected:true};}

/* Find actual game in list matching two teams */
function findGame(games, t1, t2){
  return games.find(function(g){
    return (g.t1===t1&&g.t2===t2)||(g.t1===t2&&g.t2===t1);
  })||null;
}

/* Merge projected with actual game if found */
function resolve(projected, actuals){
  if(!projected) return null;
  if(!projected.t1||!projected.t2) return projected;
  var actual = findGame(actuals, projected.t1, projected.t2);
  return actual || projected;
}

function renderBracket(){
  var div = document.getElementById('fdiv').value;
  var out = document.getElementById('out');
  if(!div){out.innerHTML='<div class="empty"><div class="icon">🏆</div><h3>Select a Division</h3><p>Choose a division to view the playoff bracket.</p></div>';return;}

  var dg = GAMES.filter(function(g){return g.div===div;});
  var qfRaw = dg.filter(function(g){return QF_DATES.indexOf(g.date)>=0;}).sort(sortDT);
  var sfRaw = dg.filter(function(g){return SF_DATES.indexOf(g.date)>=0;}).sort(sortDT);
  var fRaw  = dg.filter(function(g){return F_DATES.indexOf(g.date)>=0;})[0]||null;

  if(!qfRaw.length&&!sfRaw.length&&!fRaw){
    out.innerHTML='<div class="empty"><div class="icon">📅</div><h3>No Playoff Games Yet</h3><p>The '+div+' bracket will appear once games are scheduled.</p></div>';
    return;
  }

  // Separate July 11 and July 12 for divisions with 2-stage QF
  var r11 = qfRaw.filter(function(g){return g.date==='2026-07-11';});
  var r12 = qfRaw.filter(function(g){return g.date==='2026-07-12';});
  var twoStageQF = r12.length > 0;

  var html = '<div class="div-title"><h2>🏆 '+DIV_LABELS[div]+' Division</h2></div>';
  html += '<div class="bracket-wrap">';

  if(twoStageQF){
    // 4 rounds: R1(Jul11) → R2(Jul12) → SF → Final → Champion
    // R1: 4 games
    // R2: 2 games (winners of R1 pairs advance)
    var r1Winners = r11.map(winner);

    // Project R2 matchups: pair(0,1)→R2slot0, pair(2,3)→R2slot1
    var projR2 = [
      proj(r1Winners[0], r1Winners[1]),
      proj(r1Winners[2], r1Winners[3])
    ];
    var r2Games = [resolve(projR2[0], r12), resolve(projR2[1], r12)];
    var r2Winners = r2Games.map(winner);

    // Project SF matchups
    var projSF = [proj(r2Winners[0], r2Winners[1])];
    var sfGames = [resolve(projSF[0], sfRaw)];
    var sfWinners = sfGames.map(winner);

    // Project Final
    var projF = proj(sfWinners[0], sfWinners[1]);
    var fGame = resolve(projF, fRaw ? [fRaw] : []);
    var champ = winner(fGame&&!fGame.projected?fGame:null);

    // Round 1 column (4 games)
    html += roundCol('First Round', [r11[0]||null, r11[1]||null, r11[2]||null, r11[3]||null], 4);
    html += svgConnectors(4, 2);
    html += roundCol('Round of 4', r2Games, 2);
    html += svgConnectors(2, 1);
    html += roundCol('Semifinals', sfGames, 1);
    html += svgConnectors(1, 1, true);
    html += roundCol('Finals', [fGame], 1);
    html += svgConnectors(1, 1, true, true);
    html += champCol(champ);

  } else {
    // 3 rounds: QF(Jul11) → SF → Final → Champion
    var qfGames = [qfRaw[0]||null, qfRaw[1]||null, qfRaw[2]||null, qfRaw[3]||null];
    var qfWinners = qfGames.map(winner);

    var projSF0 = proj(qfWinners[0], qfWinners[1]);
    var projSF1 = proj(qfWinners[2], qfWinners[3]);
    var sfG0 = resolve(projSF0, sfRaw);
    var sfG1 = resolve(projSF1, sfRaw);
    var sfGames = [sfG0, sfG1];
    var sfWinners = [winner(sfG0), winner(sfG1)];

    var projF = proj(sfWinners[0], sfWinners[1]);
    var fGame = resolve(projF, fRaw ? [fRaw] : []);
    var champ = winner(fGame&&!fGame.projected?fGame:null);

    html += roundCol('Quarterfinals', qfGames, 4);
    html += svgConnectors(4, 2);
    html += roundCol('Semifinals', sfGames, 2);
    html += svgConnectors(2, 1);
    html += roundCol('Finals', [fGame], 1);
    html += svgConnectors(1, 1, true, true);
    html += champCol(champ);
  }

  html += '</div>';
  out.innerHTML = html;
}

var SLOT_H = 74;   // card height px
var SLOT_GAP = 12; // gap between cards

function slotSpacing(count){
  // How many "units" of spacing between slots in a column
  return SLOT_H * count + SLOT_GAP * (count - 1);
}

function roundCol(label, games, count){
  var h = '<div class="bracket-round">';
  h += '<div class="round-label">'+label+'</div>';
  h += '<div class="bracket-slots" style="justify-content:space-around;gap:'+SLOT_GAP+'px;">';
  games.forEach(function(g){
    h += '<div class="slot">'+gameCard(g, label)+'</div>';
  });
  // Pad with empty slots if needed
  for(var i=games.length; i<count; i++){
    h += '<div class="slot">'+gameCard(null, label)+'</div>';
  }
  h += '</div></div>';
  return h;
}

function gameCard(g, roundLabel){
  if(!g || (!g.t1 && !g.t2)){
    return '<div class="game-card tbd-card"><div class="round-tag">'+roundLabel+'</div>'+
      '<div class="team-line"><span class="tname tbd">TBD</span></div>'+
      '<div class="team-line"><span class="tname tbd">TBD</span></div></div>';
  }
  var w = winner(g);
  var t1win = w && w===g.t1, t2win = w && w===g.t2;
  var t1 = g.t1||'TBD', t2 = g.t2||'TBD';
  var t1tbd = !g.t1, t2tbd = !g.t2;
  return '<div class="game-card">'+
    '<div class="round-tag">'+roundLabel+'</div>'+
    '<div class="team-line'+(t1win?' win':w?' lose':'')+'">'+
      '<span class="tname'+(t1tbd?' tbd':'')+'">'+t1+'</span>'+
      (g.s1?'<span class="tscore'+(t1win?' wscore':'')+'">'+g.s1+'</span>':'')+
      (t1win?'<span class="wbadge">W</span>':'')+
    '</div>'+
    '<div class="team-line'+(t2win?' win':w?' lose':'')+'">'+
      '<span class="tname'+(t2tbd?' tbd':'')+'">'+t2+'</span>'+
      (g.s2?'<span class="tscore'+(t2win?' wscore':'')+'">'+g.s2+'</span>':'')+
      (t2win?'<span class="wbadge">W</span>':'')+
    '</div>'+
  '</div>';
}

function svgConnectors(fromCount, toCount, narrow, last){
  var w = last ? 40 : 32;
  var fromH = slotSpacing(fromCount);
  var toH = slotSpacing(toCount);
  var totalH = Math.max(fromH, toH);
  var fromSpacing = totalH / fromCount;
  var toSpacing = totalH / toCount;

  var svg = '<svg width="'+w+'" height="'+totalH+'" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;align-self:stretch;">';

  // Group from-lines into pairs going to each to-slot
  var ratio = fromCount / toCount;
  for(var t=0; t<toCount; t++){
    var toY = toSpacing * (t + 0.5);
    // Draw horizontal line to right (going to next column or champ)
    svg += '<line x1="'+(w/2)+'" y1="'+toY+'" x2="'+w+'" y2="'+toY+'" stroke="#d4a017" stroke-width="2"/>';
    // Draw vertical line connecting from-lines
    var f0 = t * ratio;
    var f1 = f0 + ratio - 1;
    var fromY0 = fromSpacing * (f0 + 0.5);
    var fromY1 = fromSpacing * (f1 + 0.5);
    if(fromCount > toCount){
      svg += '<line x1="0" y1="'+fromY0+'" x2="'+(w/2)+'" y2="'+fromY0+'" stroke="#d4a017" stroke-width="2"/>';
      svg += '<line x1="0" y1="'+fromY1+'" x2="'+(w/2)+'" y2="'+fromY1+'" stroke="#d4a017" stroke-width="2"/>';
      svg += '<line x1="'+(w/2)+'" y1="'+fromY0+'" x2="'+(w/2)+'" y2="'+fromY1+'" stroke="#d4a017" stroke-width="2"/>';
    } else {
      svg += '<line x1="0" y1="'+toY+'" x2="'+(w/2)+'" y2="'+toY+'" stroke="#d4a017" stroke-width="2"/>';
    }
  }
  svg += '</svg>';
  return svg;
}

function champCol(champ){
  return '<div class="bracket-round">'+
    '<div class="round-label">Champion</div>'+
    '<div class="bracket-slots" style="justify-content:center;">'+
    '<div class="slot"><div class="champ-box">'+
      '<div class="ci">🏆</div>'+
      '<div class="cl">Champion</div>'+
      (champ ? '<div class="cn">'+champ+'</div>' : '<div class="ctbd">TBD</div>')+
    '</div></div></div></div>';
}

loadGames();
</script>
</body>
</html>
