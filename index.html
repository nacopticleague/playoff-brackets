<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NA Coptic League — Playoff Brackets</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#fff;min-height:100vh;overflow-x:hidden;}

/* ── Header ── */
.header{background:#7d1a1a;padding:18px 20px 16px;text-align:center;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#c9b5a5,#e07878,#c9b5a5);}
.header h1{font-family:Arial,sans-serif;font-size:1.55rem;color:#e8b4b4;font-weight:800;letter-spacing:.02em;}
.header .sub{font-size:.72rem;color:#c98a8a;margin-top:4px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;}

/* ── Filters ── */
.filters{background:#d8c8ba;border-bottom:2px solid #b8a492;padding:16px 16px 14px;}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;max-width:900px;margin:0 auto;}
.fg{flex:1;min-width:140px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:#5c1010;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.fg select{width:100%;padding:9px 12px;border:2px solid #b8a492;border-radius:6px;font-size:.88rem;font-weight:600;color:#5c1010;background:#fff;cursor:pointer;font-family:Arial,sans-serif;}
.fg select:focus{outline:none;border-color:#7d1a1a;box-shadow:0 0 0 3px rgba(125,26,26,.15);}

/* ── Main ── */
.main{max-width:900px;margin:0 auto;padding:20px 14px 40px;overflow:hidden;}

/* ── Bracket ── */
.bracket-scale{transform-origin:top left;width:760px;}
.bracket-wrapper{min-width:760px;padding:10px 0;}
.round-labels{display:flex;margin-bottom:8px;}
.round-labels span{flex:1;text-align:center;font-size:.7rem;font-weight:700;color:#5c1010;text-transform:uppercase;letter-spacing:.08em;}

.bracket{display:flex;align-items:stretch;position:relative;}
.round{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:0 6px;}

/* ── Matchup card ── */
.matchup{background:#fff;border:1.5px solid #d8c8ba;border-radius:6px;margin:6px 0;overflow:hidden;box-shadow:0 1px 4px rgba(80,20,20,.06);}
.matchup.decided .team.winner{background:#fdf8f4;}
.team{display:flex;align-items:center;padding:6px 10px;gap:8px;border-bottom:1px solid #f0e6dd;font-size:.78rem;color:#555;font-weight:600;}
.team:last-child{border-bottom:none;}
.team .seed{font-size:.6rem;font-weight:700;color:#fff;background:#7d1a1a;padding:1px 5px;border-radius:3px;min-width:20px;text-align:center;}
.team .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team .score{font-weight:700;color:#888;min-width:22px;text-align:right;font-size:.82rem;}
.team.winner .name{color:#5c1010;font-weight:800;}
.team.winner .score{color:#7d1a1a;font-weight:800;}
.team.tbd .name{color:#bbb;font-style:italic;}

/* ── Champion box ── */
.champion-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:110px;padding:12px 8px;}
.trophy{font-size:2rem;margin-bottom:4px;}
.champ-label{font-size:.6rem;font-weight:700;color:#5c1010;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.champ-name{font-size:.85rem;font-weight:800;color:#7d1a1a;text-align:center;}

/* ── Connectors ── */
.round .matchup{position:relative;}

/* ── Gold styling for Finals ── */
.round.finals .matchup{border-color:#C5963A;background:linear-gradient(135deg,#FFFDF5,#FFF8E7);}
.round.finals .team.winner .name{color:#6B4F0A;}
.round.finals .team.winner .score{color:#8B6914;}
.round.finals .team .seed{background:linear-gradient(135deg,#C5963A,#E8C252);color:#3d2600;}
.champion-box .champ-name{color:#7d1a1a;}
.champion-box.has-champ{background:linear-gradient(135deg,#FFFDF5,#FFF8E7);border:1.5px solid #C5963A;border-radius:6px;}

@media(max-width:520px){
  .filter-row{flex-direction:column;}
  .fg{min-width:100%;}
  .header h1{font-size:1.3rem;}
  .main{padding:12px 6px 30px;}
  .team{padding:5px 8px;font-size:.72rem;}
  .team .seed{font-size:.55rem;padding:1px 4px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>2026 Playoff Brackets</h1>
  <div class="sub">NA Coptic League &middot; July 2026</div>
</div>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>Division</label>
      <select id="fdiv" onchange="renderBracket()">
        <option value="JHS">Junior High School (JHS)</option>
        <option value="Girls">Girls</option>
        <option value="HS-NY">High School — NY</option>
        <option value="HS-NJ">High School — NJ</option>
        <option value="College">College</option>
        <option value="Mens">Mens</option>
      </select>
    </div>
  </div>
</div>

<div class="main"><div id="out"></div></div>

<script>
/* ── Bracket seedings from final regular season standings ── */
var BRACKETS={
  "JHS":{
    seeds:["Queens","SI1","EB (1)","Makkar","Summit","SI2","West Side","Holmdel"],
    /* results: [firstRound x4, semis x2, final x1] — null = not played */
    /* Each result: [score1, score2] where score1=higher seed */
    results:[null,null,null,null,null,null,null]
  },
  "Girls":{
    seeds:["EB (1)","Queens","SI1","Holmdel","Belleville","Bayonne 1 (SASA)","Makkar","EB (2)"],
    results:[null,null,null,null,null,null,null]
  },
  "HS-NY":{
    seeds:["Queens","Astoria","Brooklyn (1)","SI1 (1)","Long Island (1)","SI1 (2)","SI2 (2)","SI2 (1)"],
    results:[null,null,null,null,null,null,null]
  },
  "HS-NJ":{
    seeds:["EB (1)","Makkar","Holmdel","EB (2)","Upstate","Philadelphia","West Side","Bayonne 1 (SASA) (2)"],
    results:[null,null,null,null,null,null,null]
  },
  "College":{
    seeds:["SI1","EB (1)","Philadelphia","Holmdel","Brooklyn","Bayonne 1 (SASA)","EB (2)","Queens"],
    results:[null,null,null,null,null,null,null]
  },
  "Mens":{
    seeds:["Long Island","EB","Summit","Queens","Holmdel","SI2","SI1","Bayonne 1 (SASA)"],
    results:[null,null,null,null,null,null,null]
  }
};

/* ── Standard 8-team bracket order: 1v8, 4v5, 3v6, 2v7 ── */
var MATCHUP_ORDER=[[0,7],[3,4],[2,5],[1,6]]; /* seed indices */

function getWinner(result,teamA,teamB){
  if(!result)return null;
  return result[0]>result[1]?teamA:result[1]>result[0]?teamB:null;
}

function renderBracket(){
  var div=document.getElementById('fdiv').value;
  var b=BRACKETS[div];
  if(!b){document.getElementById('out').innerHTML='';return;}

  var seeds=b.seeds;
  var res=b.results;

  /* First round matchups */
  var fr=[];
  MATCHUP_ORDER.forEach(function(pair,i){
    var tA={name:seeds[pair[0]],seed:pair[0]+1};
    var tB={name:seeds[pair[1]],seed:pair[1]+1};
    var r=res[i];
    var winner=r?getWinner(r,tA,tB):null;
    fr.push({teamA:tA,teamB:tB,scoreA:r?r[0]:null,scoreB:r?r[1]:null,winner:winner});
  });

  /* Semis */
  var sf=[];
  for(var s=0;s<2;s++){
    var w1=fr[s*2].winner;
    var w2=fr[s*2+1].winner;
    var tA=w1||{name:'TBD',seed:null};
    var tB=w2||{name:'TBD',seed:null};
    var r=res[4+s];
    var winner=r&&w1&&w2?getWinner(r,tA,tB):null;
    sf.push({teamA:tA,teamB:tB,scoreA:r?r[0]:null,scoreB:r?r[1]:null,winner:winner});
  }

  /* Final */
  var fw1=sf[0].winner;
  var fw2=sf[1].winner;
  var fA=fw1||{name:'TBD',seed:null};
  var fB=fw2||{name:'TBD',seed:null};
  var fRes=res[6];
  var finalWinner=fRes&&fw1&&fw2?getWinner(fRes,fA,fB):null;
  var finalGame={teamA:fA,teamB:fB,scoreA:fRes?fRes[0]:null,scoreB:fRes?fRes[1]:null,winner:finalWinner};

  /* Build HTML */
  var h='<div class="bracket-scale" id="bracket-scale"><div class="bracket-wrapper">';

  /* Round labels */
  h+='<div class="round-labels"><span>First Round</span><span>Semifinals</span><span>Championship</span><span></span></div>';

  h+='<div class="bracket">';

  /* Round 1 */
  h+='<div class="round r1">';
  fr.forEach(function(m){h+=matchupHTML(m);});
  h+='</div>';

  /* Semis */
  h+='<div class="round r2">';
  sf.forEach(function(m){h+=matchupHTML(m);});
  h+='</div>';

  /* Final */
  h+='<div class="round finals r3">';
  h+=matchupHTML(finalGame);
  h+='</div>';

  /* Champion */
  var champClass=finalWinner?'champion-box has-champ':'champion-box';
  h+='<div class="'+champClass+'">';
  h+='<div class="trophy">🏆</div>';
  h+='<div class="champ-label">Champion</div>';
  h+='<div class="champ-name">'+(finalWinner?finalWinner.name:'')+'</div>';
  h+='</div>';

  h+='</div></div></div>';

  document.getElementById('out').innerHTML=h;
  scaleBracket();
}

function matchupHTML(m){
  var decided=(m.scoreA!=null&&m.scoreB!=null);
  var cls='matchup'+(decided?' decided':'');
  var aWin=m.winner&&m.winner.name===m.teamA.name;
  var bWin=m.winner&&m.winner.name===m.teamB.name;
  var tbd=!m.teamA.seed;

  var h='<div class="'+cls+'">';
  h+=teamHTML(m.teamA,m.scoreA,aWin,!m.teamA.seed);
  h+=teamHTML(m.teamB,m.scoreB,bWin,!m.teamB.seed);
  h+='</div>';
  return h;
}

function teamHTML(team,score,isWinner,isTBD){
  var cls='team'+(isWinner?' winner':'')+(isTBD?' tbd':'');
  var seedHtml=team.seed?'<span class="seed">#'+team.seed+'</span>':'';
  var scoreHtml=(score!=null)?'<span class="score">'+score+'</span>':'';
  return '<div class="'+cls+'">'+seedHtml+'<span class="name">'+team.name+'</span>'+scoreHtml+'</div>';
}

renderBracket();

/* ── Scale bracket to fit container without horizontal scroll ── */
function scaleBracket(){
  var el=document.getElementById('bracket-scale');
  if(!el)return;
  var container=el.parentElement;
  var containerW=container.clientWidth;
  var bracketW=760;
  var scale=Math.min(1,containerW/bracketW);
  el.style.transform='scale('+scale+')';
  el.style.transformOrigin='top left';
  /* Adjust container height to match scaled content */
  el.parentElement.style.height=(el.scrollHeight*scale)+'px';
}
window.addEventListener('resize',function(){scaleBracket();});
window.addEventListener('load',function(){scaleBracket();});

/* ── Iframe auto-resize ── */
function broadcastHeight(){window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');}
window.addEventListener('load',broadcastHeight);
new MutationObserver(broadcastHeight).observe(document.body,{childList:true,subtree:true});
setInterval(broadcastHeight,500);
</script>
</body>
</html>
